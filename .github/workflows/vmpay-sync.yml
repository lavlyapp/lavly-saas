name: VMPay Global Sync Automation

on:
  schedule:
    # HORÁRIOS DIURNOS (07:30 às 22:00 no Brasil = 10:30 às 01:00 no UTC)
    # Roda a cada 30 minutos
    - cron: '30 10 * * *'      # 07:30 BRT (10:30 UTC)
    - cron: '*/30 11-23 * * *' # 08:00 às 20:30 BRT (11:00 às 23:30 UTC)
    - cron: '*/30 0 * * *'     # 21:00 e 21:30 BRT (00:00 e 00:30 UTC)
    - cron: '0 1 * * *'        # 22:00 BRT (01:00 UTC)
    
    # HORÁRIOS NOTURNOS (De 3 em 3 horas após as 22:00 BRT)
    # Roda às 01:00 e 04:00 BRT (04:00 e 07:00 UTC)
    - cron: '0 4,7 * * *'

  # Permite acionamento manual do fluxo de trabalho direto pelo painel do GitHub
  workflow_dispatch:

jobs:
  sync:
    name: Trigger Next.js Cron Endpoint
    runs-on: ubuntu-latest
    
    steps:
      - name: Set API URL based on branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "API_URL=https://www.lavly.com.br/api/vmpay/cron/sync" >> $GITHUB_ENV
          else
            echo "API_URL=https://teste.lavly.com.br/api/vmpay/cron/sync" >> $GITHUB_ENV
          fi

      - name: Disparar Sincronização Segura
        run: |
          curl -X GET "${{ env.API_URL }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -s -o response.json -w "%{http_code}" > status_code.txt
          
          # Lemos o HTTP Status (ex: 200) e checamos sucesso
          STATUS_CODE=$(cat status_code.txt)
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Sincronização concluída com sucesso! Status: $STATUS_CODE"
            cat response.json
          else
            echo "Falha na sincronização! Status: $STATUS_CODE"
            cat response.json
            exit 1
          fi

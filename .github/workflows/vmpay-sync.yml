name: VMPay Global Sync Automation

on:
  schedule:
    # HORÁRIOS DIURNOS (07:30 às 22:00 no Brasil = 10:30 às 01:00 no UTC)
    # Roda a cada 30 minutos
    - cron: '30 10 * * *'      # 07:30 BRT (10:30 UTC)
    - cron: '*/30 11-23 * * *' # 08:00 às 20:30 BRT (11:00 às 23:30 UTC)
    - cron: '*/30 0 * * *'     # 21:00 e 21:30 BRT (00:00 e 00:30 UTC)
    - cron: '0 1 * * *'        # 22:00 BRT (01:00 UTC)
    
    # HORÁRIOS NOTURNOS (De 3 em 3 horas após as 22:00 BRT)
    # Roda às 01:00, 04:00 e 07:00 BRT (04:00, 07:00 e 10:00 UTC)
    - cron: '0 4,7,10 * * *'

  # Permite acionamento manual do fluxo de trabalho direto pelo painel do GitHub
  workflow_dispatch:

jobs:
  sync:
    name: Trigger Next.js Cron Endpoint
    runs-on: ubuntu-latest
    
    steps:
      - name: Disparar Sincronização - Produção
        run: |
          echo "Disparando www.lavly.com.br..."
          curl -X GET "https://www.lavly.com.br/api/vmpay/cron/sync" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -s -o response_prod.json -w "%{http_code}" > status_prod.txt
          
          STATUS_CODE=$(cat status_prod.txt)
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Produção concluída! Status: $STATUS_CODE"
            cat response_prod.json
          else
            echo "Falha na produção! Status: $STATUS_CODE"
            cat response_prod.json
          fi

      - name: Disparar Sincronização - Teste
        run: |
          echo "Disparando teste.lavly.com.br..."
          curl -X GET "https://teste.lavly.com.br/api/vmpay/cron/sync" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -s -o response_teste.json -w "%{http_code}" > status_teste.txt
          
          STATUS_CODE=$(cat status_teste.txt)
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Teste concluído! Status: $STATUS_CODE"
            cat response_teste.json
          else
            echo "Falha no teste! Status: $STATUS_CODE"
            cat response_teste.json
          fi

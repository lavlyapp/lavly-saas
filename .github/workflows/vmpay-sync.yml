name: VMPay Global Sync Automation

on:
  schedule:
    # HORÁRIOS DIURNOS — a cada 30 minutos das 07:00 às 22:00 BRT
    # (BRT = UTC-3, portanto 10:00 UTC às 01:00 UTC do dia seguinte)
    - cron: '*/30 10-23 * * *' # 07:00 às 20:30 BRT (10:00 às 23:30 UTC)
    - cron: '*/30 0 * * *'     # 21:00 e 21:30 BRT (00:00 e 00:30 UTC)
    - cron: '0 1 * * *'        # 22:00 BRT (01:00 UTC)

    # HORÁRIO NOTURNO — uma única execução às 01:00 BRT
    - cron: '0 4 * * *'        # 01:00 BRT (04:00 UTC)

  # Permite acionamento manual do fluxo de trabalho direto pelo painel do GitHub
  workflow_dispatch:

jobs:
  sync:
    name: Trigger Next.js Cron Endpoint
    runs-on: ubuntu-latest

    steps:
      - name: Disparar Sincronização - Produção
        run: |
          echo "Disparando www.lavly.com.br..."
          STATUS_CODE=$(curl -X GET "https://www.lavly.com.br/api/vmpay/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -s -o response_prod.json -w "%{http_code}")

          echo "Status: $STATUS_CODE"
          cat response_prod.json

          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "::error::Falha na produção! Status HTTP: $STATUS_CODE"
            exit 1
          fi

          # Detecta resposta HTML (página de login da Vercel = Deployment Protection ativa)
          if grep -qi "<html\|Vercel Authentication" response_prod.json; then
            echo "::error::Produção retornou página de autenticação da Vercel em vez da API. Verifique o Deployment Protection."
            exit 1
          fi

          echo "Produção concluída com sucesso!"

      - name: Disparar Sincronização - Teste
        if: always()
        run: |
          echo "Disparando teste.lavly.com.br..."
          STATUS_CODE=$(curl -X GET "https://teste.lavly.com.br/api/vmpay/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            -s -o response_teste.json -w "%{http_code}")

          echo "Status: $STATUS_CODE"
          cat response_teste.json

          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "::error::Falha no teste! Status HTTP: $STATUS_CODE"
            exit 1
          fi

          if grep -qi "<html\|Vercel Authentication" response_teste.json; then
            echo "::error::Teste retornou página de autenticação da Vercel em vez da API. Configure o VERCEL_BYPASS_SECRET ou desative o Deployment Protection."
            exit 1
          fi

          echo "Teste concluído com sucesso!"
